services:
  app:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    working_dir: /var/www/html
    volumes:
      - .:/var/www/html
    ports:
      - "8001:8000"
    environment:
      COMPOSER_ALLOW_SUPERUSER: "1"
      DB_CONNECTION: mongodb
      DB_URI: 'mongodb://admin:admin!@72.61.136.135:27017/?authSource=admin'
      DB_DATABASE: ubys_backend
    command: ["sh", "./docker/php/entrypoint.sh", "php", "artisan", "serve", "--host=0.0.0.0", "--port=8000"]
