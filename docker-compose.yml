services:
  app:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    working_dir: /var/www/html
    volumes:
      - .:/var/www/html
    ports:
      - "8001:8000"
    environment:
      COMPOSER_ALLOW_SUPERUSER: "1"
    depends_on:
      - mongodb
    command: ["sh", "./docker/php/entrypoint.sh", "php", "artisan", "serve", "--host=0.0.0.0", "--port=8000"]

  mongodb:
    image: mongo:7
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db

volumes:
  mongodb_data:
