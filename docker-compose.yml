services:
  php:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    working_dir: /var/www/html
    volumes:
      - .:/var/www/html
    environment:
      COMPOSER_ALLOW_SUPERUSER: "1"
      DB_CONNECTION: mongodb
      DB_URI: 'mongodb://admin:admin!@72.61.136.135:27017/?authSource=admin&serverSelectionTimeoutMS=5000&connectTimeoutMS=5000&socketTimeoutMS=10000'
      DB_DATABASE: ubys_backend
    command: ["sh", "./docker/php/entrypoint.sh", "php-fpm"]

  nginx:
    image: nginx:alpine
    ports:
      - "8001:8000"
    volumes:
      - .:/var/www/html
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - php
