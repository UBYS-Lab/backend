map $http_origin $cors_origin {
    default "";
    "http://localhost:4000"    $http_origin;
    "http://127.0.0.1:4000"   $http_origin;
    "http://localhost:4200"    $http_origin;
    "http://127.0.0.1:4200"   $http_origin;
    ~^http://172\.20\.        $http_origin;
    ~^http://192\.168\.       $http_origin;
    ~^http://10\.             $http_origin;
    ~^https://.*\.ngrok\.io$  $http_origin;
    ~^https://.*\.ngrok-free\.app$  $http_origin;
}

server {
    listen 8000;
    root /var/www/html/public;
    client_max_body_size 110M;
    index index.php;

    location / {
        if ($request_method = 'OPTIONS') {
            add_header 'Access-Control-Allow-Origin'  $http_origin always;
            add_header 'Access-Control-Allow-Methods' 'GET, POST, PUT, PATCH, DELETE, OPTIONS' always;
            add_header 'Access-Control-Allow-Headers' 'Content-Type, Authorization, X-Requested-With, Accept, X-User-Id' always;
            add_header 'Access-Control-Max-Age'       86400 always;
            add_header 'Content-Length' 0;
            return 204;
        }

        try_files $uri $uri/ /index.php?$query_string;
    }

    location ~ \.php$ {
        fastcgi_pass php:9000;
        fastcgi_param SCRIPT_FILENAME $realpath_root$fastcgi_script_name;
        include fastcgi_params;
        fastcgi_hide_header X-Powered-By;
        fastcgi_read_timeout 30;
    }

    location ~ /\.(?!well-known).* {
        deny all;
    }
}
